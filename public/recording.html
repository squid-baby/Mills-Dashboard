<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a1a0e" />
  <title>Recording Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
      transition: background-color 0.6s ease, color 0.6s ease;
      overflow: hidden;
    }

    body.off { background-color: #0a1a0e; color: #4ade80; }
    body.on  { background-color: #1a0505; color: #f87171; }
    body.unknown { background-color: #0f0f12; color: #94a3b8; }

    .pulse-ring {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    body.on .pulse-ring {
      animation: pulse 1.8s ease-out infinite;
      border: 3px solid rgba(248, 113, 113, 0.6);
    }

    @keyframes pulse {
      0%   { transform: translate(-50%, -50%) scale(0.85); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.6);  opacity: 0; }
    }

    .icon-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 120px;
    }

    .mic-icon {
      font-size: 96px;
      line-height: 1;
      transition: filter 0.4s ease;
      position: relative;
      z-index: 1;
    }

    body.on  .mic-icon { filter: drop-shadow(0 0 24px rgba(248, 113, 113, 0.9)); }
    body.off .mic-icon { filter: grayscale(0.4) brightness(0.7); }
    body.unknown .mic-icon { filter: grayscale(1) brightness(0.5); }

    .headline {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.05;
      text-transform: uppercase;
      transition: color 0.4s ease;
      max-width: 18ch;
    }

    body.on .headline { animation: flicker 3s ease-in-out infinite; }

    @keyframes flicker {
      0%, 92%, 100% { opacity: 1; }
      94%           { opacity: 0.85; }
      96%           { opacity: 1; }
      98%           { opacity: 0.9; }
    }

    .subtext {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 500;
      opacity: 0.7;
      text-align: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .since {
      font-size: clamp(0.85rem, 2vw, 1rem);
      opacity: 0.55;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    .status-dot {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      opacity: 0.45;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    body.on .dot { animation: blink 1s step-start infinite; }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body class="unknown">

  <div class="pulse-ring"></div>

  <div class="icon-wrap">
    <div class="mic-icon" id="icon">🎙️</div>
  </div>

  <div class="headline" id="headline">Checking…</div>
  <div class="subtext" id="subtext">Loading status</div>
  <div class="since" id="since"></div>

  <div class="status-dot">
    <div class="dot"></div>
    <span id="statusLabel">…</span>
  </div>

  <script>
    function fmtSince(iso) {
      if (!iso) return '';
      const start = new Date(iso).getTime();
      const elapsed = Math.max(0, Math.floor((Date.now() - start) / 1000));
      const m = Math.floor(elapsed / 60);
      const s = elapsed % 60;
      if (m === 0) return `Recording for ${s}s`;
      if (m < 60) return `Recording for ${m}m ${String(s).padStart(2, '0')}s`;
      const h = Math.floor(m / 60);
      const mm = m % 60;
      return `Recording for ${h}h ${String(mm).padStart(2, '0')}m`;
    }

    let lastState = null;

    function applyState(data) {
      lastState = data;
      const body = document.body;
      const headline = document.getElementById('headline');
      const subtext  = document.getElementById('subtext');
      const since    = document.getElementById('since');
      const label    = document.getElementById('statusLabel');

      if (data.recording) {
        body.className = 'on';
        headline.textContent = 'Big Brother Is Listening';
        subtext.textContent  = 'Recording is currently ACTIVE';
        since.textContent    = fmtSince(data.since);
        label.textContent    = 'Recording';
      } else {
        body.className = 'off';
        headline.textContent = 'Go Ahead and Talk Shit';
        subtext.textContent  = 'Recording is currently OFF';
        since.textContent    = '';
        label.textContent    = 'Idle';
      }
    }

    function applyError() {
      document.body.className = 'unknown';
      document.getElementById('headline').textContent = 'Status Unknown';
      document.getElementById('subtext').textContent  = 'Cannot reach status server';
      document.getElementById('since').textContent    = '';
      document.getElementById('statusLabel').textContent = 'Offline';
    }

    async function poll() {
      try {
        const res = await fetch('/api/recording-status', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        applyState(data);
      } catch {
        applyError();
      }
    }

    // Refresh "Recording for Xs" timer every second without re-fetching
    function tickTimer() {
      if (lastState && lastState.recording) {
        document.getElementById('since').textContent = fmtSince(lastState.since);
      }
    }

    poll();
    setInterval(poll, 3000);
    setInterval(tickTimer, 1000);
  </script>

</body>
</html>
