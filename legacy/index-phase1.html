function parseDate(d) {
  if (!d) return new Date(2099,0,1);
  const p = d.split("/").map(Number);
  return new Date(2000+(p[2]<100?p[2]:p[2]-2000), p[0]-1, p[1]);
}
function fmtMonth(d) {
  return parseDate(d).toLocaleDateString("en-US",{month:"short",year:"2-digit"});
}
function daysUntil(d) {
  return Math.ceil((parseDate(d)-new Date())/(864e5));
}

// ─── COMPONENTS ─────────────────────────────────────────────────────────────

function StatusBadge({group}) {
  const c = GC[group];
  return e("span", {style:{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:c.color+"22",color:c.color,letterSpacing:0.3}},
    e("span",{style:{fontSize:13}},c.icon), " ", c.label
  );
}

function Tile({unit, onClick}) {
  const c = GC[unit.group];
  const days = daysUntil(unit.leaseEnd);
  const urgent = days <= 30 && !["renewed","turnover_rented"].includes(unit.group);
  
  return e("div", {
    onClick: onClick,
    style: {
      background:c.bg, border:"1.5px solid "+(urgent?"#ef4444":c.color+"44"),
      borderRadius:8, padding:"10px 12px", cursor:"pointer", transition:"all 0.15s ease",
      position:"relative", overflow:"hidden", minHeight:72,
      boxShadow: urgent?"0 0 12px #ef444433":"none",
    },
    onMouseEnter: function(ev){ev.currentTarget.style.transform="translateY(-1px)";ev.currentTarget.style.boxShadow="0 4px 16px #00000044"},
    onMouseLeave: function(ev){ev.currentTarget.style.transform="none";ev.currentTarget.style.boxShadow=urgent?"0 0 12px #ef444433":"none"},
  },
    urgent && e("div",{style:{position:"absolute",top:0,right:0,background:"#ef4444",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:"0 0 0 6px",letterSpacing:0.5}},
      days<=0?"OVERDUE":days+"d"
    ),
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}},
      e("div",{style:{minWidth:0,flex:1}},
        e("div",{style:{fontSize:13,fontWeight:700,color:"#f4f4f5",lineHeight:1.2,marginBottom:3}},unit.address),
        e("div",{style:{fontSize:11,color:"#a1a1aa",display:"flex",gap:8,flexWrap:"wrap"}},
          e("span",null,unit.beds+" BR"),
          e("span",{style:{color:"#71717a"}},"·"),
          e("span",null,unit.leaseEnd),
          unit.area && e("span",{style:{color:"#71717a"}},"·"),
          unit.area && e("span",null,unit.area),
        )
      ),
      e("div",{style:{flexShrink:0}},
        e("span",{style:{display:"inline-block",width:24,height:24,borderRadius:6,background:c.color,textAlign:"center",lineHeight:"24px",fontSize:14,color:"#000",fontWeight:700}},c.icon)
      )
    ),
    unit.notes && e("div",{style:{marginTop:6,fontSize:10,color:"#a1a1aa",fontStyle:"italic",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},
      "💬 "+unit.notes
    ),
    unit._userNotes && unit._userNotes.length > 0 && e("div",{style:{marginTop:4,fontSize:10,color:"#fbbf24"}},
      "📝 "+unit._userNotes.length+" note"+(unit._userNotes.length>1?"s":"")
    )
  );
}

function DetailPanel({unit, onClose, onAddNote}) {
  const [noteText, setNoteText] = useState("");
  const [localNotes, setLocalNotes] = useState(unit._userNotes||[]);
  const c = GC[unit.group];

  useEffect(function(){
    setLocalNotes(unit._userNotes||[]);
    setNoteText("");
  },[unit.id]);

  function handleAdd(){
    if(!noteText.trim())return;
    var n = {text:noteText.trim(),time:new Date().toLocaleString(),by:"Andrea"};
    var updated = [n].concat(localNotes);
    setLocalNotes(updated);
    onAddNote(unit.id,updated);
    setNoteText("");
  }

  var factPairs = [
    ["Bedrooms",unit.beds+" BR"],["Lease End",unit.leaseEnd],
    ["Owner",unit.owner],["Area",unit.area],
    ["Lease Signed",unit.allSigned?"✅ Yes":"❌ No"],["Deposit Paid",unit.allDeposit?"✅ Yes":"❌ No"],
  ];

  return e("div",{style:{position:"fixed",top:0,right:0,bottom:0,width:"min(440px, 92vw)",background:"#18181b",borderLeft:"2px solid "+c.color+"44",zIndex:100,overflowY:"auto",boxShadow:"-8px 0 40px #00000088"}},
    e("div",{style:{padding:20}},
      // Header
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}},
        e("div",null,
          e("h2",{style:{margin:0,fontSize:20,fontWeight:800,color:"#f4f4f5",letterSpacing:-0.5}},unit.address),
          e("div",{style:{marginTop:6}},e(StatusBadge,{group:unit.group}))
        ),
        e("button",{onClick:onClose,style:{background:"#27272a",border:"none",color:"#a1a1aa",cursor:"pointer",width:32,height:32,borderRadius:6,fontSize:18,lineHeight:"32px"}},"×")
      ),
      // Substate
      e("div",{style:{background:c.color+"11",border:"1px solid "+c.color+"33",borderRadius:6,padding:"8px 12px",marginBottom:16,fontSize:13,color:c.text}},unit.substate),
      // Facts grid
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}},
        factPairs.map(function(p){
          return e("div",{key:p[0],style:{background:"#27272a",borderRadius:6,padding:"6px 10px"}},
            e("div",{style:{fontSize:10,color:"#71717a",textTransform:"uppercase",letterSpacing:0.5}},p[0]),
            e("div",{style:{fontSize:13,color:"#e4e4e7",fontWeight:600}},p[1])
          );
        })
      ),
      // Residents
      e("div",{style:{marginBottom:16}},
        e("h3",{style:{margin:"0 0 8px",fontSize:12,color:"#71717a",textTransform:"uppercase",letterSpacing:1}},"Current Residents ("+unit.residents.length+")"),
        unit.residents.map(function(r,i){
          return e("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #27272a"}},
            e("div",null,
              e("div",{style:{fontSize:13,color:"#e4e4e7",fontWeight:500}},r.name),
              e("div",{style:{fontSize:11,color:"#71717a"}},r.email)
            ),
            e("span",{style:{fontSize:10,padding:"2px 6px",borderRadius:3,fontWeight:600,
              background:r.status==="renewing"?"#22c55e22":r.status==="leaving"?"#f9731622":"#a1a1aa22",
              color:r.status==="renewing"?"#4ade80":r.status==="leaving"?"#fb923c":"#a1a1aa",
            }},r.status)
          );
        })
      ),
      // Next year residents
      unit.nextResidents.length>0 && e("div",{style:{marginBottom:16}},
        e("h3",{style:{margin:"0 0 8px",fontSize:12,color:"#71717a",textTransform:"uppercase",letterSpacing:1}},"Next Year Residents ("+unit.nextResidents.length+")"),
        unit.nextResidents.map(function(r,i){
          return e("div",{key:i,style:{padding:"6px 0",borderBottom:"1px solid #27272a"}},
            e("div",{style:{fontSize:13,color:"#a78bfa",fontWeight:500}},r.name),
            e("div",{style:{fontSize:11,color:"#71717a"}},r.email+(r.phone?" · "+r.phone:""))
          );
        })
      ),
      // Spreadsheet notes
      (unit.notes||unit.turnoverNotes) && e("div",{style:{marginBottom:16,background:"#27272a",borderRadius:6,padding:10}},
        e("h3",{style:{margin:"0 0 6px",fontSize:12,color:"#71717a",textTransform:"uppercase",letterSpacing:1}},"Spreadsheet Notes"),
        unit.notes && e("div",{style:{fontSize:12,color:"#d4d4d8",marginBottom:4}},unit.notes),
        unit.turnoverNotes && e("div",{style:{fontSize:12,color:"#fbbf24",marginTop:4}},"🔧 Turnover: "+unit.turnoverNotes)
      ),
      // Quick notes
      e("div",{style:{marginBottom:16}},
        e("h3",{style:{margin:"0 0 8px",fontSize:12,color:"#71717a",textTransform:"uppercase",letterSpacing:1}},"Quick Notes"),
        e("div",{style:{display:"flex",gap:6,marginBottom:8}},
          e("input",{type:"text",value:noteText,
            onChange:function(ev){setNoteText(ev.target.value)},
            onKeyDown:function(ev){if(ev.key==="Enter")handleAdd()},
            placeholder:"Type a note and press Enter...",
            style:{flex:1,background:"#27272a",border:"1px solid #3f3f46",borderRadius:6,padding:"8px 10px",color:"#e4e4e7",fontSize:13,outline:"none"}
          }),
          e("button",{onClick:handleAdd,style:{background:c.color,border:"none",borderRadius:6,padding:"0 14px",color:"#000",fontWeight:700,fontSize:13,cursor:"pointer"}},"+")
        ),
        localNotes.map(function(n,i){
          return e("div",{key:i,style:{padding:"6px 8px",background:"#27272a",borderRadius:4,marginBottom:4,borderLeft:"3px solid "+c.color}},
            e("div",{style:{fontSize:12,color:"#e4e4e7"}},n.text),
            e("div",{style:{fontSize:10,color:"#71717a",marginTop:2}},n.by+" · "+n.time)
          );
        }),
        localNotes.length===0 && e("div",{style:{fontSize:12,color:"#52525b",fontStyle:"italic"}},"No notes yet. Tap here and type.")
      )
    )
  );
}

function SummaryBar({units}) {
  var counts = {};
  units.forEach(function(u){counts[u.group]=(counts[u.group]||0)+1;});
  return e("div",{style:{display:"flex",gap:6,flexWrap:"wrap",padding:"8px 0"}},
    Object.keys(GC).map(function(key){
      var cfg=GC[key];
      return e("div",{key:key,style:{display:"flex",alignItems:"center",gap:5,background:cfg.color+"15",border:"1px solid "+cfg.color+"33",borderRadius:6,padding:"4px 10px"}},
        e("span",{style:{color:cfg.color,fontSize:14}},cfg.icon),
        e("span",{style:{color:cfg.color,fontSize:12,fontWeight:700}},counts[key]||0),
        e("span",{style:{color:"#a1a1aa",fontSize:11}},cfg.label)
      );
    }),
    e("div",{style:{display:"flex",alignItems:"center",gap:5,background:"#ffffff08",borderRadius:6,padding:"4px 10px"}},
      e("span",{style:{color:"#f4f4f5",fontSize:12,fontWeight:700}},units.length),
      e("span",{style:{color:"#a1a1aa",fontSize:11}},"total units")
    )
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────

function Dashboard() {
  const [sortBy, setSortBy] = useState("date");
  const [filterGroup, setFilterGroup] = useState(null);
  const [filterArea, setFilterArea] = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  const [searchText, setSearchText] = useState("");
  const [userNotes, setUserNotes] = useState(function(){
    try { return JSON.parse(localStorage.getItem("mills_notes")||"{}"); } catch(e){ return {}; }
  });

  // Persist notes to localStorage
  useEffect(function(){
    try { localStorage.setItem("mills_notes", JSON.stringify(userNotes)); } catch(e){}
  },[userNotes]);

  var enriched = useMemo(function(){
    return UNITS.map(function(u){return Object.assign({},u,{_userNotes:userNotes[u.id]||[]});});
  },[userNotes]);

  var filtered = useMemo(function(){
    var list = enriched;
    if(filterGroup) list = list.filter(function(u){return u.group===filterGroup;});
    if(filterArea) list = list.filter(function(u){return u.area===filterArea;});
    if(searchText){
      var q = searchText.toLowerCase();
      list = list.filter(function(u){
        return u.address.toLowerCase().includes(q) ||
          u.residents.some(function(r){return r.name.toLowerCase().includes(q);}) ||
          u.owner.toLowerCase().includes(q);
      });
    }
    return list;
  },[enriched,filterGroup,filterArea,searchText]);

  var grouped = useMemo(function(){
    var sorted = filtered.slice().sort(function(a,b){
      if(sortBy==="date") return parseDate(a.leaseEnd)-parseDate(b.leaseEnd);
      if(sortBy==="priority") return PRIO.indexOf(a.group)-PRIO.indexOf(b.group);
      if(sortBy==="area") return (a.area||"ZZZ").localeCompare(b.area||"ZZZ");
      if(sortBy==="owner") return (a.owner||"ZZZ").localeCompare(b.owner||"ZZZ");
      if(sortBy==="status") return (a.group||"").localeCompare(b.group||"");
      return 0;
    });
    var groups = {};
    sorted.forEach(function(u){
      var key;
      if(sortBy==="date") key=fmtMonth(u.leaseEnd);
      else if(sortBy==="area") key=u.area||"Unknown";
      else if(sortBy==="owner") key=u.owner||"Unknown";
      else if(sortBy==="status") key=GC[u.group]?GC[u.group].label:u.group;
      else if(sortBy==="priority") key=GC[u.group]?GC[u.group].label:u.group;
      else key="All";
      if(!groups[key]) groups[key]=[];
      groups[key].push(u);
    });
    return groups;
  },[filtered,sortBy]);

  var selectedUnit = enriched.find(function(u){return u.id===selectedId;});
  var areas = Array.from(new Set(UNITS.map(function(u){return u.area;}).filter(Boolean))).sort();

  var handleAddNote = useCallback(function(unitId, notes){
    setUserNotes(function(prev){
      var next = Object.assign({},prev);
      next[unitId] = notes;
      return next;
    });
  },[]);

  return e("div",{style:{minHeight:"100vh",background:"#09090b",color:"#f4f4f5"}},
    // Overlay
    selectedId && e("div",{onClick:function(){setSelectedId(null)},style:{position:"fixed",inset:0,background:"#00000066",zIndex:50}}),
    // Detail panel
    selectedUnit && e(DetailPanel,{unit:selectedUnit,onClose:function(){setSelectedId(null)},onAddNote:handleAddNote}),
    // Header
    e("div",{style:{padding:"16px 20px 0",borderBottom:"1px solid #27272a",position:"sticky",top:0,background:"#09090b",zIndex:40}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}},
        e("div",{style:{display:"flex",alignItems:"baseline",gap:10}},
          e("h1",{style:{margin:0,fontSize:22,fontWeight:900,letterSpacing:-1,background:"linear-gradient(135deg, #f4f4f5, #a1a1aa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"MILLS RENTALS"),
          e("span",{style:{fontSize:12,color:"#52525b",fontWeight:500}},"DASHBOARD v0.1")
        ),
        e("input",{type:"text",value:searchText,
          onChange:function(ev){setSearchText(ev.target.value)},
          placeholder:"Search address, tenant, owner...",
          style:{background:"#18181b",border:"1px solid #27272a",borderRadius:6,padding:"6px 12px",color:"#e4e4e7",fontSize:12,width:240,outline:"none",fontFamily:"inherit"}
        })
      ),
      // Toolbar
      e("div",{style:{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",padding:"10px 0"}},
        e("span",{style:{fontSize:10,color:"#52525b",textTransform:"uppercase",letterSpacing:1,marginRight:4}},"Sort:"),
        SORT_OPTS.map(function(o){
          return e("button",{key:o.key,onClick:function(){setSortBy(o.key)},style:{
            background:sortBy===o.key?"#f4f4f5":"#27272a",color:sortBy===o.key?"#09090b":"#a1a1aa",
            border:"none",borderRadius:4,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"
          }},o.label);
        }),
        e("span",{style:{width:1,height:16,background:"#27272a",margin:"0 4px"}}),
        e("span",{style:{fontSize:10,color:"#52525b",textTransform:"uppercase",letterSpacing:1,marginRight:4}},"Filter:"),
        e("select",{value:filterGroup||"",onChange:function(ev){setFilterGroup(ev.target.value||null)},style:{background:"#27272a",color:"#a1a1aa",border:"1px solid #3f3f46",borderRadius:4,padding:"3px 8px",fontSize:11,fontFamily:"inherit",cursor:"pointer"}},
          e("option",{value:""},"All Statuses"),
          Object.keys(GC).map(function(k){return e("option",{key:k,value:k},GC[k].icon+" "+GC[k].label);})
        ),
        e("select",{value:filterArea||"",onChange:function(ev){setFilterArea(ev.target.value||null)},style:{background:"#27272a",color:"#a1a1aa",border:"1px solid #3f3f46",borderRadius:4,padding:"3px 8px",fontSize:11,fontFamily:"inherit",cursor:"pointer"}},
          e("option",{value:""},"All Areas"),
          areas.map(function(a){return e("option",{key:a,value:a},a);})
        ),
        (filterGroup||filterArea||searchText) && e("button",{onClick:function(){setFilterGroup(null);setFilterArea(null);setSearchText("")},style:{background:"#ef4444",color:"#fff",border:"none",borderRadius:4,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}},"Clear")
      ),
      e(SummaryBar,{units:filtered})
    ),
    // Grid
    e("div",{style:{padding:"16px 20px 40px"}},
      Object.keys(grouped).map(function(groupLabel){
        var units = grouped[groupLabel];
        return e("div",{key:groupLabel,style:{marginBottom:24}},
          e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1a1a1e"}},
            e("h2",{style:{margin:0,fontSize:14,fontWeight:800,color:"#e4e4e7",letterSpacing:-0.3}},groupLabel),
            e("span",{style:{fontSize:11,color:"#52525b",background:"#18181b",padding:"1px 6px",borderRadius:3}},units.length+(units.length===1?" unit":" units"))
          ),
          e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))",gap:8}},
            units.map(function(u){
              return e(Tile,{key:u.id,unit:u,onClick:function(){setSelectedId(u.id)}});
            })
          )
        );
      }),
      Object.keys(grouped).length===0 && e("div",{style:{textAlign:"center",padding:60,color:"#52525b"}},"No units match your filters.")
    )
  );
}

ReactDOM.render(e(Dashboard), document.getElementById("root"));
</script>
</body>
