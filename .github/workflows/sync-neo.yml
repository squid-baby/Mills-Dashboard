name: Sync Neo Sheet → Supabase

# Single-pass sync of the Neo Google Sheet to Supabase:
#   • "property-info-clean" → upserts units (all property attributes)
#   • "Tenant Info"         → resident + next_resident replace

on:
  schedule:
    - cron: '0 12 * * *'   # Daily at 8am ET (noon UTC)
  workflow_dispatch:         # Manual trigger from GitHub mobile app or remote agent

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci

      - name: Sync to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SHEET_ID_PROPERTY_INFO: ${{ secrets.SHEET_ID_PROPERTY_INFO }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MEETING_EMAIL_TO: ${{ secrets.MEETING_EMAIL_TO }}
        run: node scripts/sync-from-neo.mjs
